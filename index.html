<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  var map = L.map('map', {
    center: [48.862, 1.950],
    zoom: 11,
    scrollWheelZoom: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 18
  }).addTo(map);

  /* Contour officiel via API geo.gouv.fr — fonctionne sur GitHub Pages */
  fetch('https://geo.api.gouv.fr/epcis/200034130?fields=contour&format=geojson&geometry=contour')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      L.geoJSON(data, {
        style: { color: '#2d5a27', weight: 2.5, fillColor: '#2d5a27', fillOpacity: 0.12 }
      }).addTo(map).bindPopup('<strong>CC Gally Mauldre</strong><br><span style="font-size:12px;color:#7a6550;">Zone d\'intervention principale</span>');
    })
    .catch(function() {
      L.polygon([
        [48.920,1.843],[48.918,1.880],[48.920,1.905],[48.912,1.930],
        [48.905,1.950],[48.895,1.960],[48.880,1.982],[48.872,2.000],
        [48.878,2.020],[48.872,2.040],[48.862,2.060],[48.850,2.065],
        [48.838,2.055],[48.832,2.038],[48.830,2.010],[48.833,1.988],
        [48.840,1.965],[48.838,1.945],[48.875,1.855],[48.870,1.840],
        [48.868,1.820],[48.878,1.815],[48.895,1.830],[48.910,1.835],[48.920,1.843]
      ], { color:'#2d5a27', weight:2.5, fillColor:'#2d5a27', fillOpacity:0.12 }).addTo(map);
    });

  var iconVert = L.divIcon({
    className: '',
    html: '<div style="width:12px;height:12px;background:#2d5a27;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.25);"></div>',
    iconSize: [12, 12], iconAnchor: [6, 6]
  });

  var iconGris = L.divIcon({
    className: '',
    html: '<div style="width:10px;height:10px;background:#7a6550;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);opacity:0.7;"></div>',
    iconSize: [10, 10], iconAnchor: [5, 5]
  });

  var principale = [
    { nom: "Saint-Nom-la-Bretèche", lat: 48.8574, lng: 2.0194 },
    { nom: "Feucherolles",          lat: 48.8728, lng: 1.9742 },
    { nom: "Chavenay",              lat: 48.8361, lng: 1.9978 },
    { nom: "Crespières",            lat: 48.8528, lng: 1.9539 },
    { nom: "Davron",                lat: 48.8561, lng: 1.9853 },
    { nom: "Mareil-sur-Mauldre",    lat: 48.8833, lng: 1.8694 },
    { nom: "Herbeville",            lat: 48.9053, lng: 1.8869 },
    { nom: "Maule",                 lat: 48.9080, lng: 1.8498 },
    { nom: "Bazemont",              lat: 48.9131, lng: 1.8931 },
    { nom: "Montainville",          lat: 48.8831, lng: 1.8639 },
    { nom: "Andelu",                lat: 48.8803, lng: 1.8250 }
  ];

  var secondaire = [
    { nom: "Versailles", lat: 48.8049, lng: 2.1204 },
    { nom: "Plaisir", lat: 48.8197, lng: 1.9533 },
    { nom: "Les Clayes-sous-Bois", lat: 48.8247, lng: 1.9764 },
    { nom: "Villepreux", lat: 48.8314, lng: 2.0000 }
  ];

  principale.forEach(function(c) {
    L.marker([c.lat, c.lng], { icon: iconVert }).addTo(map)
      .bindPopup('<strong>' + c.nom + '</strong><br><span style="font-size:12px;color:#2d5a27;">Zone principale</span>');
  });

  secondaire.forEach(function(c) {
    L.marker([c.lat, c.lng], { icon: iconGris }).addTo(map)
      .bindPopup('<strong>' + c.nom + '</strong><br><span style="font-size:12px;color:#7a6550;">Sur demande</span>');
  });

  map.on('focus', function() { map.scrollWheelZoom.enable(); });
  map.on('blur', function() { map.scrollWheelZoom.disable(); });
</script>

<script>
  (function() {
    var burger = document.getElementById('navBurger');
    var navLinks = document.getElementById('navLinks');
    if (!burger || !navLinks) return;
    burger.addEventListener('click', function() {
      var isOpen = navLinks.classList.toggle('open');
      burger.classList.toggle('open', isOpen);
      burger.setAttribute('aria-expanded', String(isOpen));
      burger.setAttribute('aria-label', isOpen ? 'Fermer le menu' : 'Ouvrir le menu');
    });
    navLinks.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        navLinks.classList.remove('open');
        burger.classList.remove('open');
        burger.setAttribute('aria-expanded', 'false');
        burger.setAttribute('aria-label', 'Ouvrir le menu');
      });
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('nav')) {
        navLinks.classList.remove('open');
        burger.classList.remove('open');
        burger.setAttribute('aria-expanded', 'false');
        burger.setAttribute('aria-label', 'Ouvrir le menu');
      }
    });
  })();
</script>
